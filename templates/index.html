<!doctype html>
<html>
  <head>
    <title>DEFENCE INTELLIGENCE DASHBOARD</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  </head>

  <body>
    <header class="main-header">
      <div class="header-left">
        <img
          src="{{ url_for('static', filename='assets/IndianNavyCrest-NewDesignBW6F-removebg-preview.png') }}"
          class="header-logo"
          alt="Indian Navy"
        />
      </div>

      <div class="header-center">
        <h1>DEFENCE INTELLIGENCE DASHBOARD</h1>
        <span class="classified-tag">OSINT MONITORING SYSTEM</span>
      </div>

      <nav class="nav">
        <button onclick="showInsights()">AI Insights</button>
        <button onclick="showMap()">Heatmap</button>
        <button onclick="showNews()">Newsletters</button>
      </nav>

      <div class="header-right">
        <img
          src="{{ url_for('static', filename='assets/valsura-removebg-preview.png') }}"
          class="header-logo"
          alt="Valsura"
        />
      </div>
    </header>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Sources:</label>
        <div style="display: flex; gap: 10px; align-items: center">
          <label
            ><input type="checkbox" class="src-check" value="news" checked />
            News</label
          >
          <label
            ><input type="checkbox" class="src-check" value="twitter" />
            Twitter</label
          >
        </div>
      </div>
      <div class="filter-group">
        <label>Intelligence Sector:</label>
        <select id="locationSelect">
          <option value="Gujarat">Gujarat</option>
          <option value="Jammu and Kashmir">Jammu and Kashmir</option>
          <option value="Ladakh">Ladakh</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="West Bengal">West Bengal</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Assam">Assam</option>
          <option value="Delhi">Delhi</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Threat Keyword:</label>
        <select id="keywordSelect">
          <option value="military activity">Military Activity</option>
          <option value="non state actors">Non State Actors</option>
          <option value="hacktivists">Hacktivists</option>
          <option value="internal actors">Internal Actors</option>
          <option value="Artificial Intelligence">Artificial Intelligence</option>
          <option value="paramilitary">Paramilitary</option>
          <option value="Indian Navy">Indian Navy</option>
          <option value="Indian Army">Indian Army</option>
          <option value="border tension">Border Tension</option>
          <option value="maritime security">Maritime Security</option>
          <option value="Anti-Terrorism Squad">Anti Terrorism Squad</option>

        </select>
      </div>

      <div class="filter-group">
        <label>From:</label>
        <input type="date" id="fromDate" />
      </div>

      <div class="filter-group">
        <label>To:</label>
        <input type="date" id="toDate" />
      </div>

      <button class="apply-btn" onclick="applyFilters()">
        Execute Intelligence Scan
      </button>
    </div>

    <!-- MAP SECTION -->
    <div id="mapSection" class="section active">
      <h2>Military & Naval Intelligence Heatmap</h2>
      <div id="map"></div>
    </div>

    <!-- NEWS SECTION -->
    <div id="newsSection" class="section">
      <h2>Summarized Defence Newsletters</h2>
      <div id="newsContent"></div>
    </div>

    <!-- AI SECTION -->
    <div id="insightsSection" class="section">
      <h2>AI Strategic Intelligence Assessment</h2>
      <div id="aiContent"></div>
    </div>

    <footer class="footer">
      <span>© Defence OSINT Analytics Engine</span>
      <span>For Internal Strategic Use</span>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script>
      window.onload = function () {
        // Set default dates to avoid empty results
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("toDate").value = today;
    
        // Trigger the master scan instead of the old separate functions
        applyFilters(); 
      };
    </script>
  </body>
</html>

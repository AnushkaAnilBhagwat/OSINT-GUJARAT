<!doctype html>
<html>
  <head>
    <title>DEFENCE INTELLIGENCE DASHBOARD</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  </head>

  <body>
    <div class="top-container">
      <header class="main-header">
        <div class="header-left">
          <img
            src="{{ url_for('static', filename='assets/IndianNavyCrest-NewDesignBW6F-removebg-preview.png') }}"
            class="header-logo"
            alt="Indian Navy"
          />
        </div>

        <div class="header-center">
          <h2>OSINT DASHBOARD</h2>
        </div>

        <div class="header-right">
          <img
            src="{{ url_for('static', filename='assets/valsura-removebg-preview.png') }}"
            class="header-logo"
            alt="Valsura"
          />
        </div>
      </header>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-group">
          <label>Sources:</label>
          <div style="display: flex; gap: 10px; align-items: center">
            <label
              ><input type="checkbox" class="src-check" value="news" checked />
              News</label
            >
            <label
              ><input type="checkbox" class="src-check" value="twitter" />
              Twitter</label
            >
          </div>
        </div>
        <div class="filter-group">
          <label>Intelligence Sector:</label>
          <select id="locationSelect">
            <option value="Andaman and Nicobar Islands">
              Andaman and Nicobar Islands
            </option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
            <option value="Assam">Assam</option>
            <option value="Bihar">Bihar</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Chhattisgarh">Chhattisgarh</option>
            <option value="Dadra and Nagar Haveli and Daman and Diu">
              Dadra and Nagar Haveli and Daman and Diu
            </option>
            <option value="Delhi">Delhi</option>
            <option value="Goa">Goa</option>
            <option value="Gujarat" selected>Gujarat</option>
            <option value="Haryana">Haryana</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Jammu and Kashmir">Jammu and Kashmir</option>
            <option value="Jharkhand">Jharkhand</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Kerala">Kerala</option>
            <option value="Ladakh">Ladakh</option>
            <option value="Lakshadweep">Lakshadweep</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Manipur">Manipur</option>
            <option value="Meghalaya">Meghalaya</option>
            <option value="Mizoram">Mizoram</option>
            <option value="Nagaland">Nagaland</option>
            <option value="Odisha">Odisha</option>
            <option value="Puducherry">Puducherry</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Sikkim">Sikkim</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Telangana">Telangana</option>
            <option value="Tripura">Tripura</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Uttarakhand">Uttarakhand</option>
            <option value="West Bengal">West Bengal</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Threat Keyword:</label>
          <input
            type="text"
            id="keywordSelect"
            placeholder="e.g. Artificial Intelligence"
            style="text-transform: none"
          />
        </div>

        <div class="filter-group">
          <label>From:</label>
          <input type="date" id="fromDate" />
        </div>

        <div class="filter-group">
          <label>To:</label>
          <input type="date" id="toDate" />
        </div>

        <div class="ais-container">
          <span class="ais-header">AIS Data</span>

          <div class="filter-group">
            <label>Country:</label>
            <select id="countrySelect">
              <option value="All">All</option>
              <option value="Pakistan">Pakistan</option>
              <option value="China">China</option>
              <option value="Bangladesh">Bangladesh</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Vessel Type:</label>
            <select id="typeSelect">
              <option value="All">All</option>
              <option value="Naval">Naval</option>
              <option value="Cargo">Cargo</option>
              <option value="Tanker">Tanker</option>
            </select>
          </div>
        </div>

        <nav class="nav">
          <button onclick="showMap()">Map</button>
          <button onclick="showInsights()">Insights</button>
          <button onclick="showNews()">List</button>

          <div class="map-legend">
            <div class="legend-item">
              <span class="dot news-dot"></span> News/Intel
            </div>
            <div class="legend-item">
              <span class="dot naval-dot"></span> Naval Ships
            </div>
            <div class="legend-item">
              <span class="dot cargo-dot"></span> Cargo Ships
            </div>
            <div class="legend-item">
              <span class="dot tanker-dot"></span> Tankers
            </div>
            <div class="legend-item">
              <span class="icon port-icon">📍</span> Ports
            </div>
          </div>
        </nav>

        <button class="apply-btn" onclick="applyFilters()">
          Execute Intelligence Scan
        </button>

      </div>
    </div>
    <div id="scanInfoBar" class="scan-info-bar" style="display: none">
      <div class="info-item">
        <span class="info-label">Sector:</span>
        <span id="displaySector" class="info-value">--</span>
      </div>
      <div class="info-item">
        <span class="info-label">Objective:</span>
        <span id="displayKeyword" class="info-value">--</span>
      </div>
    </div>
    <div id="mapSection" class="section active">
      <div id="map"></div>
    </div>

    <!-- NEWS SECTION -->
    <div id="newsSection" class="section">
      <div id="newsContent"></div>
    </div>

    <!-- AI SECTION -->
    <div id="insightsSection" class="section">
      <div id="aiContent"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script>
      window.onload = function () {
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("toDate").value = today;

        // Set Map as default active button
        updateNavButtons("Map");
      };
    </script>
  </body>
</html>
